<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Mum</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg,#ff9ec4,#ffd6ec,#fff0f7);
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
        text-align: center;
    }

    .card {
        background: white;
        padding: 40px 60px;
        border-radius: 25px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        animation: float 3s ease-in-out infinite;
    }

    h1 {
        font-size: 3rem;
        color: #ff3d81;
        margin-bottom: 10px;
        animation: glow 2s infinite alternate;
    }

    p {
        font-size: 1.3rem;
        color: #555;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #ff9ec4; }
        to { text-shadow: 0 0 25px #ff3d81, 0 0 40px #ff7fb2; }
    }

    .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background: #ff4d88;
        transform: rotate(45deg);
        animation: rise linear infinite;
    }

    .heart::before,
    .heart::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background: #ff4d88;
        border-radius: 50%;
    }

    .heart::before { top: -10px; left: 0; }
    .heart::after { left: -10px; top: 0; }

    @keyframes rise {
        from { transform: translateY(100vh) rotate(45deg); opacity:1; }
        to { transform: translateY(-10vh) rotate(45deg); opacity:0; }
    }
</style>
</head>
<body>

<div class="card">
    <h1>Happy Birthday Mum 🎂</h1>
    <p>You are the heart of our family and the reason we smile every day.
    May your day be filled with love, laughter, and endless happiness 💖</p>
</div>

<script>
function createHeart(){
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random()*100 + 'vw';
    heart.style.animationDuration = (3 + Math.random()*3) + 's';
    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(),6000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
